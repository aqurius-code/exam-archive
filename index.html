<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>기출문제 아카이브</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #4F46E5;
      --primary-dk: #4338CA;
      --primary-lt: #EEF2FF;
      --bg: #F1F5F9;
      --card: #FFFFFF;
      --border: #E2E8F0;
      --text: #1E293B;
      --text2: #475569;
      --text3: #94A3B8;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans KR',
                   'Apple SD Gothic Neo', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: linear-gradient(135deg, #4F46E5 0%, #7C3AED 100%);
      color: #fff;
      padding: 1.75rem 2rem;
    }
    header h1 { font-size: 1.75rem; font-weight: 800; letter-spacing: -0.03em; }
    header p  { font-size: 0.875rem; opacity: 0.75; margin-top: 0.375rem; }

    /* ── Filter bar ── */
    .filters {
      background: var(--card);
      border-bottom: 1px solid var(--border);
      padding: 1rem 2rem;
      position: sticky;
      top: 0;
      z-index: 50;
      display: flex;
      flex-direction: column;
      gap: 0.625rem;
      box-shadow: 0 2px 6px rgba(0,0,0,0.06);
    }
    .filter-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-wrap: wrap;
    }
    .filter-label {
      font-size: 0.7rem;
      font-weight: 700;
      color: var(--text3);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      min-width: 2.5rem;
    }
    .chips { display: flex; flex-wrap: wrap; gap: 0.375rem; }

    .chip {
      padding: 0.3rem 0.75rem;
      border-radius: 9999px;
      border: 1.5px solid var(--border);
      background: var(--card);
      color: var(--text2);
      font-size: 0.8125rem;
      font-family: inherit;
      cursor: pointer;
      line-height: 1.4;
      transition: border-color 0.12s, background 0.12s, color 0.12s;
    }
    .chip:hover { border-color: var(--primary); color: var(--primary); }
    .chip.on {
      background: var(--primary); border-color: var(--primary);
      color: #fff; font-weight: 600;
    }

    /* ── Main ── */
    main { max-width: 1280px; margin: 0 auto; padding: 1.5rem 2rem 3rem; }

    .meta-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.25rem;
    }
    .count { font-size: 0.875rem; color: var(--text2); }
    .count strong { color: var(--text); font-weight: 700; }

    .reset-btn {
      font-size: 0.8125rem;
      color: var(--primary);
      background: none;
      border: none;
      cursor: pointer;
      font-family: inherit;
      padding: 0.25rem 0.625rem;
      border-radius: 0.375rem;
      transition: background 0.12s;
      visibility: hidden;
    }
    .reset-btn:hover { background: var(--primary-lt); }
    .reset-btn.show { visibility: visible; }

    /* ── Card grid ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 1rem;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 0.875rem;
      padding: 1.25rem;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      transition: transform 0.18s, box-shadow 0.18s, border-color 0.18s;
    }
    .card:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 24px rgba(79,70,229,0.13);
      border-color: #A5B4FC;
    }
    .card-top { display: flex; gap: 0.4rem; flex-wrap: wrap; }

    .badge {
      font-size: 0.7rem;
      font-weight: 600;
      padding: 0.2rem 0.55rem;
      border-radius: 9999px;
    }
    .by { background: var(--primary-lt); color: var(--primary); }
    .bs { background: #FFF7ED; color: #EA580C; }
    .bt { background: #F0FDF4; color: #16A34A; }

    .card-subject {
      font-size: 1.3125rem;
      font-weight: 800;
      letter-spacing: -0.02em;
    }
    .card-grade { font-size: 0.8125rem; color: var(--text2); }
    .card-foot { display: flex; justify-content: flex-end; margin-top: 0.5rem; }

    .view-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.375rem;
      padding: 0.5rem 1rem;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 0.5rem;
      font-size: 0.8125rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.12s;
    }
    .view-btn:hover { background: var(--primary-dk); }

    /* ── Empty / Error state ── */
    .empty {
      grid-column: 1 / -1;
      text-align: center;
      padding: 5rem 2rem;
      color: var(--text3);
    }
    .empty-icon { font-size: 3.5rem; line-height: 1; margin-bottom: 1rem; }
    .empty h2  { font-size: 1.125rem; color: var(--text2); margin-bottom: 0.5rem; font-weight: 600; }
    .empty p   { font-size: 0.875rem; line-height: 1.75; }
    .empty code {
      background: #F1F5F9;
      padding: 0.15em 0.45em;
      border-radius: 0.25em;
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 0.85em;
      color: var(--text);
    }

    /* ── PDF Viewer overlay ── */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(15,23,42,0.65);
      z-index: 200;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(4px);
    }
    .overlay.open { display: flex; }

    .viewer {
      background: var(--card);
      border-radius: 1rem;
      width: min(900px, calc(100vw - 2rem));
      height: calc(100svh - 2rem);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 24px 64px rgba(0,0,0,0.35);
    }

    .viewer-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.875rem 1.25rem;
      border-bottom: 1px solid var(--border);
      background: #F8FAFC;
      gap: 1rem;
      flex-shrink: 0;
    }
    .viewer-title {
      font-size: 0.9375rem;
      font-weight: 700;
      flex: 1;
      min-width: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .viewer-controls { display: flex; align-items: center; gap: 0.625rem; flex-shrink: 0; }

    .page-nav { display: flex; align-items: center; gap: 0.375rem; font-size: 0.8125rem; color: var(--text2); }

    .icon-btn {
      width: 32px; height: 32px;
      border: 1px solid var(--border);
      background: #fff;
      border-radius: 0.375rem;
      cursor: pointer;
      font-size: 0.875rem;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text2);
      transition: border-color 0.12s, color 0.12s, background 0.12s;
    }
    .icon-btn:hover:not(:disabled) {
      border-color: var(--primary); color: var(--primary); background: var(--primary-lt);
    }
    .icon-btn:disabled { opacity: 0.35; cursor: not-allowed; }

    .zoom-sel {
      padding: 0.2rem 0.4rem;
      border: 1px solid var(--border);
      border-radius: 0.375rem;
      font-size: 0.8125rem;
      font-family: inherit;
      color: var(--text2);
      background: #fff;
      cursor: pointer;
    }

    .close-btn {
      width: 36px; height: 36px;
      border-radius: 50%;
      border: none;
      background: #F1F5F9;
      cursor: pointer;
      font-size: 1.125rem;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text2);
      transition: background 0.12s, color 0.12s;
    }
    .close-btn:hover { background: #E2E8F0; color: var(--text); }

    .viewer-body {
      flex: 1;
      overflow: auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      background: #CBD5E1;
      padding: 1.25rem;
      gap: 1rem;
    }

    #pdf-canvas {
      box-shadow: 0 4px 20px rgba(0,0,0,0.25);
      max-width: 100%;
      display: none;
    }

    .loading-msg {
      align-self: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
      color: #475569;
      font-size: 0.9rem;
      margin: auto;
    }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid #E2E8F0;
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Unclassified banner ── */
    .unclassified-banner {
      background: #FFFBEB;
      border-bottom: 1px solid #FDE68A;
      padding: 0.625rem 2rem;
    }
    .unclassified-toggle {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      cursor: pointer;
      font-size: 0.875rem;
      font-weight: 600;
      color: #92400E;
      background: none;
      border: none;
      font-family: inherit;
      padding: 0;
      width: 100%;
      text-align: left;
    }
    .unclassified-toggle:hover { color: #78350F; }
    .unclassified-toggle .arrow {
      margin-left: auto;
      font-size: 0.75rem;
      transition: transform 0.2s;
    }
    .unclassified-toggle.open .arrow { transform: rotate(180deg); }
    .unclassified-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: #F59E0B;
      color: #fff;
      font-size: 0.7rem;
      font-weight: 700;
      border-radius: 9999px;
      padding: 0.1rem 0.45rem;
      min-width: 1.4rem;
    }
    .unclassified-list {
      display: none;
      margin-top: 0.625rem;
      padding-left: 0;
      list-style: none;
      display: none;
      flex-direction: column;
      gap: 0.375rem;
    }
    .unclassified-list.open { display: flex; }
    .unclassified-item {
      display: flex;
      flex-direction: column;
      gap: 0.125rem;
      background: #FFFDE7;
      border: 1px solid #FDE68A;
      border-radius: 0.5rem;
      padding: 0.5rem 0.75rem;
      font-size: 0.8125rem;
    }
    .unclassified-filename {
      font-weight: 600;
      color: #78350F;
      word-break: break-all;
    }
    .unclassified-hint {
      font-size: 0.75rem;
      color: #B45309;
    }
    .unclassified-hint code {
      background: #FEF3C7;
      padding: 0.05em 0.35em;
      border-radius: 0.25em;
      font-family: 'SF Mono', 'Fira Code', monospace;
    }

    /* ── Responsive ── */
    @media (max-width: 640px) {
      header { padding: 1.25rem 1rem; }
      header h1 { font-size: 1.375rem; }
      .filters { padding: 0.75rem 1rem; }
      .unclassified-banner { padding: 0.5rem 1rem; }
      main { padding: 1rem 1rem 2rem; }
      .viewer-title { font-size: 0.8125rem; }
      .zoom-sel { display: none; }
    }
  </style>
</head>
<body>

<header>
  <h1>기출문제 아카이브</h1>
  <p>연도 · 시험 · 학년 · 과목별 시험지 모음</p>
</header>

<div class="filters">
  <div class="filter-row">
    <span class="filter-label">연도</span>
    <div class="chips" id="chips-year"></div>
  </div>
  <div class="filter-row">
    <span class="filter-label">학기</span>
    <div class="chips" id="chips-semester"></div>
  </div>
  <div class="filter-row">
    <span class="filter-label">시험</span>
    <div class="chips" id="chips-type"></div>
  </div>
  <div class="filter-row">
    <span class="filter-label">학년</span>
    <div class="chips" id="chips-grade"></div>
  </div>
  <div class="filter-row">
    <span class="filter-label">과목</span>
    <div class="chips" id="chips-subject"></div>
  </div>
</div>

<!-- Unclassified banner -->
<div class="unclassified-banner" id="unclassified-banner" style="display:none">
  <button class="unclassified-toggle" id="unclassified-toggle" onclick="toggleUnclassified()">
    <span>📂 미분류 파일</span>
    <span class="unclassified-badge" id="unclassified-count">0</span>
    <span>건 — 파일명을 올바른 형식으로 변경 후 분류해주세요</span>
    <span class="arrow">▼</span>
  </button>
  <ul class="unclassified-list" id="unclassified-list"></ul>
</div>

<main>
  <div class="meta-bar">
    <p class="count" id="count"></p>
    <button class="reset-btn" id="reset-btn" onclick="resetFilters()">필터 초기화 ✕</button>
  </div>
  <div class="grid" id="grid"></div>
</main>

<!-- PDF viewer -->
<div class="overlay" id="overlay">
  <div class="viewer">
    <div class="viewer-head">
      <span class="viewer-title" id="viewer-title"></span>
      <div class="viewer-controls">
        <div class="page-nav">
          <button class="icon-btn" id="prev-btn" onclick="changePage(-1)" disabled>◀</button>
          <span id="page-info">1 / 1</span>
          <button class="icon-btn" id="next-btn" onclick="changePage(1)" disabled>▶</button>
        </div>
        <select class="zoom-sel" id="zoom-sel" onchange="changeZoom(this.value)">
          <option value="0.5">50%</option>
          <option value="0.75">75%</option>
          <option value="1" selected>100%</option>
          <option value="1.5">150%</option>
          <option value="2">200%</option>
        </select>
        <button class="icon-btn" onclick="rotate(-90)" title="왼쪽으로 회전">↺</button>
        <button class="icon-btn" onclick="rotate(90)"  title="오른쪽으로 회전">↻</button>
        <a id="dl-link" style="display:none">
          <button class="icon-btn" title="다운로드 (↓)">↓</button>
        </a>
        <button class="close-btn" onclick="closeViewer()" title="닫기 (Esc)">✕</button>
      </div>
    </div>
    <div class="viewer-body" id="viewer-body">
      <div class="loading-msg" id="loading-msg">
        <div class="spinner"></div>
        <span>PDF 불러오는 중…</span>
      </div>
      <canvas id="pdf-canvas"></canvas>
    </div>
  </div>
</div>

<script>
  /* ── PDF.js setup ── */
  const pdfjsLib = window.pdfjsLib;
  pdfjsLib.GlobalWorkerOptions.workerSrc =
    'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

  /* ── State ── */
  const sel = { year: null, semester: null, type: null, grade: null, subject: null };
  let allExams = [];
  let currentList = [];
  let pdfDoc = null;
  let curPage = 1;
  let zoomFactor = 1;
  let pageRotation = 0;

  /* ── Bootstrap ── */
  fetch('exam-list.json')
    .then(r => { if (!r.ok) throw new Error(r.status); return r.json(); })
    .then(data => {
      // 구 형식(배열) 및 신 형식({ exams, unclassified }) 모두 지원
      if (Array.isArray(data)) {
        allExams = data;
      } else {
        allExams = data.exams || [];
        renderUnclassified(data.unclassified || []);
      }
      buildChips();
      render();
    })
    .catch(() => showFetchError());

  /* ── Unclassified banner ── */
  function renderUnclassified(list) {
    const banner = document.getElementById('unclassified-banner');
    if (!list || list.length === 0) { banner.style.display = 'none'; return; }

    banner.style.display = '';
    document.getElementById('unclassified-count').textContent = list.length;

    const ul = document.getElementById('unclassified-list');
    ul.innerHTML = list.map(f => {
      const hint = suggestFilename(f.filename);
      return `<li class="unclassified-item">
        <span class="unclassified-filename">📄 ${h(f.filename)}</span>
        <span class="unclassified-hint">올바른 파일명 예시: <code>${h(hint)}</code></span>
      </li>`;
    }).join('');
  }

  function suggestFilename(name) {
    // 괄호 안 과목 추출: 원안지(과학) → 과학
    const subjectMatch = name.match(/[（(]([^）)]+)[）)]/);
    const subject = subjectMatch ? subjectMatch[1].trim() : '과목';
    // 학년 추출: 2학년, 3학년 등
    const gradeMatch = name.match(/(\d학년)/);
    const grade = gradeMatch ? gradeMatch[1] : '학년';
    return `${grade}-${subject}.pdf`;
  }

  function toggleUnclassified() {
    const toggle = document.getElementById('unclassified-toggle');
    const list   = document.getElementById('unclassified-list');
    const open   = list.classList.toggle('open');
    toggle.classList.toggle('open', open);
  }

  /* ── Filter chip builders ── */
  const FIELD = { year: 'year', semester: 'semester', type: 'examType', grade: 'grade', subject: 'subject' };

  function buildChips() {
    ['year', 'semester', 'type', 'grade', 'subject'].forEach(k => {
      // 이 차원의 선택지 = 나머지 선택된 필터를 모두 적용한 부분집합에서 unique 추출
      const subset = allExams.filter(e =>
        (k === 'year'     || !sel.year     || e.year     === sel.year)     &&
        (k === 'semester' || !sel.semester || e.semester === sel.semester) &&
        (k === 'type'     || !sel.type     || e.examType === sel.type)     &&
        (k === 'grade'    || !sel.grade    || e.grade    === sel.grade)    &&
        (k === 'subject'  || !sel.subject  || e.subject  === sel.subject)
      );
      const values = [...new Set(subset.map(e => e[FIELD[k]]))];
      k === 'year' ? values.sort((a, b) => b.localeCompare(a)) : values.sort();

      // 선택된 값이 더 이상 유효하지 않으면 자동 해제
      if (sel[k] !== null && !values.includes(sel[k])) sel[k] = null;

      fillChips(`chips-${k}`, values, k);
    });
  }

  function fillChips(id, values, key) {
    const el = document.getElementById(id);
    el.innerHTML = '';
    el.appendChild(makeChip('전체', () => { sel[key] = null; refresh(); }, sel[key] === null));
    values.forEach(v =>
      el.appendChild(makeChip(v, () => { sel[key] = v; refresh(); }, sel[key] === v))
    );
  }

  function makeChip(label, onClick, active) {
    const b = document.createElement('button');
    b.className = 'chip' + (active ? ' on' : '');
    b.textContent = label;
    b.onclick = onClick;
    return b;
  }

  function refresh() { buildChips(); render(); syncResetBtn(); }

  function resetFilters() {
    sel.year = sel.semester = sel.type = sel.grade = sel.subject = null;
    refresh();
  }

  function syncResetBtn() {
    const active = Object.values(sel).some(v => v !== null);
    document.getElementById('reset-btn').classList.toggle('show', active);
  }

  /* ── Filtering & rendering ── */
  function getFiltered() {
    return allExams.filter(e =>
      (!sel.year     || e.year     === sel.year)     &&
      (!sel.semester || e.semester === sel.semester) &&
      (!sel.type     || e.examType === sel.type)     &&
      (!sel.grade    || e.grade    === sel.grade)    &&
      (!sel.subject  || e.subject  === sel.subject)
    );
  }

  function render() {
    currentList = getFiltered();
    document.getElementById('count').innerHTML =
      `검색 결과 <strong>${currentList.length}</strong>개`;

    const grid = document.getElementById('grid');

    if (allExams.length === 0) {
      grid.innerHTML = emptyMsg(
        '📚',
        '아직 시험지가 없습니다',
        `exams/ 폴더에 PDF를 추가한 뒤<br>
         <code>node generate-exam-list.js</code> 를 실행하세요.<br><br>
         <span style="font-size:0.8rem">파일 경로 형식: <code>exams/연도/시험종류/학년-과목.pdf</code><br>
         예시: <code>exams/2024/1차-정기고사/1학년-수학.pdf</code></span>`
      );
      return;
    }

    if (currentList.length === 0) {
      grid.innerHTML = emptyMsg('🔍', '해당하는 시험지가 없습니다',
        '다른 필터 조건을 선택해보세요.');
      return;
    }

    grid.innerHTML = currentList.map((e, i) => `
      <div class="card" onclick="openExam(${i})">
        <div class="card-top">
          <span class="badge by">${h(e.year)}</span>
          <span class="badge bs">${h(e.semester)}</span>
          <span class="badge bt">${h(e.examType)}</span>
        </div>
        <div class="card-subject">${h(e.subject)}</div>
        <div class="card-grade">${h(e.grade)}</div>
        <div class="card-foot">
          <button class="view-btn"
            onclick="event.stopPropagation(); openExam(${i})">PDF 보기 ▸</button>
        </div>
      </div>
    `).join('');
  }

  function emptyMsg(icon, title, body) {
    return `<div class="empty">
      <div class="empty-icon">${icon}</div>
      <h2>${title}</h2>
      <p>${body}</p>
    </div>`;
  }

  /* HTML-escape helper */
  function h(s) {
    return String(s)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  /* ── PDF Viewer ── */
  function openExam(i) {
    const e = currentList[i];
    openPDF(e.path, `${e.year} ${e.semester} ${e.examType} · ${e.grade} ${e.subject}`);
  }

  async function openPDF(filePath, title) {
    document.getElementById('overlay').classList.add('open');
    document.getElementById('viewer-title').textContent = title;
    showLoading(true);

    const dl = document.getElementById('dl-link');
    dl.href = filePath;
    dl.setAttribute('download', filePath.split('/').pop());
    dl.style.display = '';

    pageRotation = 0;
    pdfDoc   = await pdfjsLib.getDocument(filePath).promise;
    curPage  = 1;
    await renderPage(curPage);
  }

  async function renderPage(n) {
    showLoading(true);
    try {
      const page   = await pdfDoc.getPage(n);
      const canvas = document.getElementById('pdf-canvas');
      const body   = document.getElementById('viewer-body');
      const ctx    = canvas.getContext('2d');

      const totalRot  = (page.rotate + pageRotation) % 360;
      const bodyW     = body.clientWidth - 40;
      const rawVp     = page.getViewport({ scale: 1, rotation: totalRot });
      const autoScale = Math.min(bodyW / rawVp.width, 2.5);
      const vp        = page.getViewport({ scale: autoScale * zoomFactor, rotation: totalRot });

      canvas.width  = vp.width;
      canvas.height = vp.height;
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#fff';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      await page.render({ canvasContext: ctx, viewport: vp, intent: 'display' }).promise;

      document.getElementById('page-info').textContent = `${n} / ${pdfDoc.numPages}`;
      document.getElementById('prev-btn').disabled = n <= 1;
      document.getElementById('next-btn').disabled = n >= pdfDoc.numPages;
      showLoading(false);
    } catch (err) {
      console.error('PDF render error:', err);
      document.getElementById('loading-msg').innerHTML =
        '<span style="color:#EF4444">페이지 렌더링 실패: ' + err.message + '</span>';
    }
  }

  function showLoading(on) {
    document.getElementById('loading-msg').style.display = on ? 'flex'  : 'none';
    document.getElementById('pdf-canvas').style.display  = on ? 'none'  : 'block';
  }

  async function changePage(d) {
    if (!pdfDoc) return;
    const next = curPage + d;
    if (next < 1 || next > pdfDoc.numPages) return;
    curPage = next;
    await renderPage(curPage);
  }

  async function rotate(deg) {
    pageRotation = (pageRotation + deg + 360) % 360;
    if (!pdfDoc) return;
    await renderPage(curPage);
  }

  async function changeZoom(v) {
    zoomFactor = parseFloat(v);
    if (!pdfDoc) return;
    await renderPage(curPage);
  }

  function closeViewer() {
    document.getElementById('overlay').classList.remove('open');
    pdfDoc = null;
  }

  /* Close on backdrop click */
  document.getElementById('overlay').addEventListener('click', e => {
    if (e.target === e.currentTarget) closeViewer();
  });

  /* Keyboard shortcuts */
  document.addEventListener('keydown', e => {
    if (!document.getElementById('overlay').classList.contains('open')) return;
    if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   changePage(-1);
    if (e.key === 'ArrowRight' || e.key === 'ArrowDown')  changePage(1);
    if (e.key === 'Escape') closeViewer();
  });

  /* ── Error state ── */
  function showFetchError() {
    document.getElementById('grid').innerHTML = emptyMsg(
      '⚠️',
      'exam-list.json 파일을 불러올 수 없습니다',
      `아래 명령어를 실행해 파일을 생성하세요:<br>
       <code>node generate-exam-list.js</code>`
    );
  }
</script>
